    in: |
      3 4
      #.#.
      .#..
      #...
    out: |
      #.#.
      .#..
      #..#
  - name: sample2
    in: |
      3 3
      ###
      ###
      ###
    out: |
      ...
      ...
      ...
  - name: sample3
    in: |
      5 7
      .#.....
      .......
      ..#....
      .......
      ....#..
    out: |
      .#.##.#
      ....#..
      #.#.###
      #.....#
      ###.#.#

extend:
  - type: Text
    path: "./d"
    in: /in/*.txt
    out: /out/*.txt
